<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 - OpenClaw</title>
  <link rel="stylesheet" href="styles.css?v=3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#060A14;text-align:center;padding:24px}
    .error-content{max-width:480px}
    .error-code{font-size:120px;font-weight:900;color:var(--brand-400,#F87171);line-height:1;margin-bottom:8px;opacity:.8}
    .error-title{font-size:24px;font-weight:700;color:#F1F5F9;margin-bottom:12px}
    .error-desc{color:#94A3B8;font-size:16px;line-height:1.6;margin-bottom:32px}
    .error-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    @media(max-width:480px){.error-code{font-size:80px}.error-title{font-size:20px}}
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">页面走丢了 🦞</h1>
      <p class="error-desc">你要找的页面不存在，可能已经被移动或删除。<br>别担心，回到首页重新开始。</p>
      <div class="error-links">
        <a href="index.html" class="btn btn-primary">回到首页</a>
        <a href="download.html" class="btn btn-outline">下载安装</a>
      </div>
    </div>
  </div>

  <script>
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('openclaw-theme');
    const currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', currentTheme);
  </script>
</body>
</html>
